name: Automation Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 2 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Install Playwright Browsers
        run: mvn exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"
      - name: Test
        run: mvn -B test -Denv=qa -Dheadless=true
      - name: Dependency Check
        run: mvn -B org.owasp:dependency-check-maven:check
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: execution-artifacts
          path: target/artifacts
